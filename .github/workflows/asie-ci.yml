name: ASIE CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: asie-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build frontend and test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ASIE-Master-Build-Package-v1.0.0-r11-Agent-Engineer

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Read pnpm version
        id: pnpm-version
        shell: bash
        run: echo "version=$(node -p \"require('./package.json').packageManager?.split('@')[1] || ''\")" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        if: steps.pnpm-version.outputs.version != ''
        run: corepack prepare pnpm@${{ steps.pnpm-version.outputs.version }} --activate

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile backend
        run: python -m compileall -q backend

      - name: Run Python tests
        run: python -m unittest discover -s tests
